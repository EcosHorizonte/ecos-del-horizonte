
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecos del Horizonte v0.0.3</title>

<style>

body{
    margin:0;
    background:#222;
    font-family:Arial, sans-serif;
    text-align:center;
}

h1{
    color:white;
}

canvas{
    background:#72d86d;
    border:4px solid black;
    display:block;
    margin:10px auto;
}

#controles{
    margin-top:10px;
}

#controles button{
    width:70px;
    height:70px;
    font-size:30px;
    margin:5px;
    border-radius:15px;
}

</style>
</head>

<body>

<h1>🌍 Ecos del Horizonte 0.0.3</h1>

<canvas id="juego" width="480" height="320"></canvas>

<div id="controles">

<button id="arriba">⬆️</button>

<br>

<button id="izquierda">⬅️</button>

<button id="abajo">⬇️</button>

<button id="derecha">➡️</button>

</div>

<script>

const canvas=document.getElementById("juego");
const ctx=canvas.getContext("2d");

let jugador={
    x:240,
    y:160,
    radio:12,
    velocidad:3
};

let arriba=false;
let abajo=false;
let izquierda=false;
let derecha=false;

document.getElementById("arriba").ontouchstart=()=>arriba=true;
document.getElementById("arriba").ontouchend=()=>arriba=false;

document.getElementById("abajo").ontouchstart=()=>abajo=true;
document.getElementById("abajo").ontouchend=()=>abajo=false;

document.getElementById("izquierda").ontouchstart=()=>izquierda=true;
document.getElementById("izquierda").ontouchend=()=>izquierda=false;

document.getElementById("derecha").ontouchstart=()=>derecha=true;
document.getElementById("derecha").ontouchend=()=>derecha=false;

function actualizar(){

    if(arriba) jugador.y-=jugador.velocidad;
    if(abajo) jugador.y+=jugador.velocidad;
    if(izquierda) jugador.x-=jugador.velocidad;
    if(derecha) jugador.x+=jugador.velocidad;

    if(jugador.x<jugador.radio) jugador.x=jugador.radio;
    if(jugador.y<jugador.radio) jugador.y=jugador.radio;
    if(jugador.x>canvas.width-jugador.radio)
        jugador.x=canvas.width-jugador.radio;
    if(jugador.y>canvas.height-jugador.radio)
        jugador.y=canvas.height-jugador.radio;
}

function dibujar(){

ctx.fillStyle="#72d86d";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#8B5A2B";
ctx.fillRect(40,50,70,60);

ctx.fillStyle="#B22222";
ctx.beginPath();
ctx.moveTo(35,50);
ctx.lineTo(75,20);
ctx.lineTo(115,50);
ctx.fill();

ctx.fillStyle="#8B4513";
ctx.fillRect(340,70,10,30);

ctx.fillStyle="green";
ctx.beginPath();
ctx.arc(345,60,20,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="#8B4513";
ctx.fillRect(390,150,10,30);

ctx.fillStyle="green";
ctx.beginPath();
ctx.arc(395,140,20,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="dodgerblue";
ctx.beginPath();
ctx.arc(jugador.x,jugador.y,jugador.radio,0,Math.PI*2);
ctx.fill();

}

function juego(){

actualizar();
dibujar();

requestAnimationFrame(juego);

}

juego();

</script>

</body>
</html>
